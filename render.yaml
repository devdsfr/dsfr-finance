services:
  - type: web
    name: finance-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SPENDING_ALERT_PCT
        value: "80"
      - key: APP_ENV
        value: production
      - key: STORAGE_ENDPOINT
        value: ""
      - key: SMTP_HOST
        value: ""
      - key: PORT
        value: "8080"
      - key: CORS_ORIGINS
        value: "https://finance-frontend-6r9b.onrender.com"
    healthCheckPath: /api/v1/health

  - type: web
    name: finance-frontend
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist/dsfr-finance/browser
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "20"
    headers:
      # Hashed JS/CSS bundles never change content for a given filename — cache them for a year.
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # index.html must always be revalidated so users get the pointer to the latest hashed bundles.
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
